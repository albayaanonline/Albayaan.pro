<!DOCTYPE html>
<html lang="en" class="dark">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=5" />
    <title>Albayaan.pro — AI-Powered Language Learning Platform</title>
    <meta name="description" content="Master English, Arabic & Somali with Albayaan.pro — a premium AI-powered language learning platform with interactive lessons, quizzes, and certificates." />
    <meta name="keywords" content="language learning, English, Arabic, Somali, AI learning, online courses, Albayaan, Al-Bayaan College" />
    <meta name="robots" content="index, follow" />
    <meta name="author" content="Albayaan.pro" />
    <meta name="theme-color" content="#0a0f24" />

    <!-- Open Graph -->
    <meta property="og:title" content="Albayaan.pro — AI-Powered Language Learning" />
    <meta property="og:description" content="Master English, Arabic & Somali with AI-powered courses, quizzes and certificates." />
    <meta property="og:type" content="website" />
    <meta property="og:url" content="https://albayaan.pro" />
    <meta property="og:site_name" content="Albayaan.pro" />
    <meta property="og:locale" content="en_US" />
    <meta property="og:image" content="/logo-512.png" />

    <!-- Twitter -->
    <meta name="twitter:card" content="summary_large_image" />
    <meta name="twitter:title" content="Albayaan.pro — AI-Powered Language Learning" />
    <meta name="twitter:description" content="Master English, Arabic & Somali with AI-powered courses, quizzes and certificates." />
    <meta name="twitter:image" content="/logo-512.png" />

    <!-- Apple -->
    <meta name="apple-mobile-web-app-capable" content="yes" />
    <meta name="apple-mobile-web-app-status-bar-style" content="black-translucent" />
    <meta name="apple-mobile-web-app-title" content="Albayaan" />

    <!-- Favicon & PWA -->
    <link rel="icon" type="image/x-icon" href="/favicon.ico" />
    <link rel="icon" type="image/png" sizes="32x32" href="/logo-32.png" />
    <link rel="icon" type="image/png" sizes="16x16" href="/logo-16.png" />
    <link rel="apple-touch-icon" sizes="180x180" href="/logo-180.png" />
    <link rel="manifest" href="/manifest.json" />

    <!-- Fonts -->
    <link rel="preconnect" href="https://fonts.googleapis.com" />
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700;800;900&display=swap" rel="stylesheet" />

    <!-- Prevent flash of wrong theme -->
    <script>
      try {
        var t = localStorage.getItem('ilmai_theme');
        var d = t ? t === 'dark' : window.matchMedia('(prefers-color-scheme: dark)').matches;
        document.documentElement.classList.toggle('dark', d);
        document.documentElement.classList.toggle('light', !d);
      } catch(e) {}
    </script>
  </head>
  <body style="background:#030712;margin:0;overflow-x:hidden;">
    <div id="root"></div>
    <script type="module" src="/src/main.tsx"></script>
  </body>
</html>
